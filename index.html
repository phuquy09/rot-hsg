
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HỆ THỐNG M.I.S THỰC CHIẾN V.T.V</title>
    <style>
        /* --- GIAO DIỆN CYBERPUNK GLASSMORPHISM --- */
        :root {
            --nen-toi: #060713;
            --mau-neon-xanh: #00ffcc;
            --mau-neon-hong: #ff007f;
            --mau-kinh-mo: rgba(15, 22, 42, 0.7);
            --vien-neon: rgba(0, 255, 204, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--nen-toi);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-image: linear-gradient(rgba(0, 255, 204, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 204, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 2.5rem; text-transform: uppercase; letter-spacing: 4px; text-shadow: 0 0 15px var(--mau-neon-xanh); }
        header p { color: #8a99ad; margin-top: 5px; }

        .khung-dieu-hanh { display: grid; grid-template-columns: 2fr 1fr; gap: 25px; width: 100%; max-width: 1300px; }

        .the-giao-dien {
            background: var(--mau-kinh-mo);
            backdrop-filter: blur(15px); border: 1px solid var(--vien-neon);
            border-radius: 16px; padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .tieu-de-the {
            font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 15px; color: var(--mau-neon-xanh);
            border-bottom: 1px dashed rgba(0, 255, 204, 0.3); padding-bottom: 8px;
            display: flex; justify-content: space-between;
        }

        /* --- MA TRẬN NHIỆM VỤ ĐỘNG --- */
        .ma-tran-tuan { display: flex; flex-direction: column; gap: 15px; }
        .the-ngay {
            background: rgba(255, 255, 255, 0.03); border-radius: 10px; padding: 15px;
            border-left: 4px solid #475569; position: relative;
        }
        .the-ngay.hom-nay { border-left-color: var(--mau-neon-xanh); background: rgba(0, 255, 204, 0.05); }
        
        .khung-tieude-ngay { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .ten-ngay { font-weight: bold; font-size: 1.1rem; text-transform: uppercase; color: #fff;}
        .the-ngay.hom-nay .ten-ngay { color: var(--mau-neon-xanh); text-shadow: 0 0 8px var(--mau-neon-xanh); }
        
        /* Hiển thị Phần trăm */
        .phan-tram-hoan-thanh { font-family: 'Courier New', monospace; font-size: 1.2rem; font-weight: bold; color: var(--mau-neon-xanh); text-shadow: 0 0 8px var(--mau-neon-xanh);}
        .thanh-tien-do-ngay { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-bottom: 15px; overflow: hidden; }
        .loi-tien-do { height: 100%; background: var(--mau-neon-xanh); width: 0%; transition: width 0.5s ease-in-out; box-shadow: 0 0 8px var(--mau-neon-xanh);}

        .danh-sach-task { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px;}
        .o-nhiem-vu {
            background: rgba(255, 255, 255, 0.05); padding: 6px 14px; border-radius: 20px;
            font-size: 0.9rem; border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 8px;
        }
        .o-nhiem-vu:hover { border-color: var(--mau-neon-xanh); }
        .o-nhiem-vu.da-xong { text-decoration: line-through; background: rgba(71, 85, 105, 0.4); color: #64748b; border-color: transparent; }
        
        .nut-xoa { color: var(--mau-neon-hong); font-weight: bold; font-size: 1rem; border: none; background: none; cursor: pointer;}
        .nut-xoa:hover { text-shadow: 0 0 5px var(--mau-neon-hong); }

        /* Khung nhập liệu (Dòng lệnh console) */
        .khung-nhap-lieu { width: 100%; }
        .input-muc-tieu {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px dashed rgba(0, 255, 204, 0.4);
            color: var(--mau-neon-xanh); padding: 8px 15px; border-radius: 5px; outline: none;
            font-family: 'Courier New', monospace; transition: 0.3s;
        }
        .input-muc-tieu:focus { border-style: solid; box-shadow: 0 0 10px rgba(0, 255, 204, 0.2); }

        /* --- ĐỒNG HỒ TÙY CHỈNH --- */
        .khu-vuc-dong-ho { display: flex; flex-direction: column; align-items: center; padding: 20px 10px; }
        .vong-xoay-nang-luong { position: relative; width: 180px; height: 180px; display: flex; justify-content: center; align-items: center; margin-bottom: 15px; }
        .vong-xoay-nang-luong svg { width: 180px; height: 180px; transform: rotate(-90deg); }
        .vong-xoay-nang-luong circle { fill: none; stroke-width: 8; stroke: rgba(255, 255, 255, 0.05); }
        .vong-xoay-nang-luong .thanh-tai-tai { stroke: var(--mau-neon-xanh); stroke-dasharray: 502; stroke-dashoffset: 0; transition: 1s linear; filter: drop-shadow(0 0 8px var(--mau-neon-xanh)); }
        
        .con-so-dong-ho { position: absolute; font-size: 2.2rem; font-weight: bold; font-family: 'Courier New'; text-shadow: 0 0 10px var(--mau-neon-xanh); }
        
        .khung-cai-dat-gio { display: flex; align-items: center; gap: 10px; margin-bottom: 15px;}
        .input-phut { width: 60px; background: transparent; border: 1px solid var(--mau-neon-xanh); color: var(--mau-neon-xanh); text-align: center; padding: 5px; border-radius: 4px; font-weight: bold;}
        
        button {
            background: transparent; color: var(--mau-neon-xanh); border: 1px solid var(--mau-neon-xanh);
            padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s;
        }
        button:hover { background: var(--mau-neon-xanh); color: var(--nen-toi); box-shadow: 0 0 10px var(--mau-neon-xanh); }
        button.nut-dung { color: var(--mau-neon-hong); border-color: var(--mau-neon-hong); }
        button.nut-dung:hover { background: var(--mau-neon-hong); color: #fff; box-shadow: 0 0 10px var(--mau-neon-hong); }

        /* --- NHẬT KÝ HỆ THỐNG M.I.S --- */
        .tram-lenh-mis { grid-column: 1 / 3; background: rgba(5, 5, 10, 0.85); font-family: 'Courier New'; border-color: rgba(0, 255, 204, 0.3); }
        .loi-dong-lenh { height: 100px; overflow-y: auto; color: #38bdf8; font-size: 0.9rem; line-height: 1.5; }

        body.che-do-meo { --mau-neon-xanh: #ff66cc; --mau-neon-hong: #ff007f; }
    </style>
</head>
<body>

    <header>
        <h1>THỜI KHÓA BIỂU</h1>
        <p>Nhớ học theo tkb nhé bạn sẽ làm được mà vì nv1 nhé</p>
    </header>

    <main class="khung-dieu-hanh">
        
        <!-- BẢNG ĐIỀU KHIỂN NHIỆM VỤ ĐỘNG -->
        <section class="the-giao-dien">
            <div class="tieu-de-the">
                <span>Ma Trận Dữ Liệu Tuần</span>
                <span id="hien-thi-ngay" style="font-size: 0.9rem; color: #64748b;"></span>
            </div>
            <div class="ma-tran-tuan" id="bo-khung-tuan">
                <!-- Javascript sẽ tự động vẽ UI ở đây -->
            </div>
        </section>

        <!-- ĐỒNG HỒ & THÔNG SỐ -->
        <div style="display: flex; flex-direction: column; gap: 25px;">
            <section class="the-giao-dien khu-vuc-dong-ho">
                <div class="tieu-de-the" style="width: 100%;">Đếm ngược giờ</div>
                <div class="vong-xoay-nang-luong" id="vong-xoay">
                    <svg><circle cx="90" cy="90" r="80"></circle><circle class="thanh-tai-tai" id="vong-tien-trinh" cx="90" cy="90" r="80"></circle></svg>
                    <div class="con-so-dong-ho" id="thoi-gian-so">25:00</div>
                </div>
                
                <div class="khung-cai-dat-gio">
                    <span style="color: #8a99ad; font-size: 0.9rem;">Thiết lập:</span>
                    <input type="number" id="input-phut" class="input-phut" value="25" min="1" max="120">
                    <span style="color: #8a99ad; font-size: 0.9rem;">phút</span>
                    <button onclick="capNhatThoiGianMoi()" style="padding: 4px 10px; font-size: 0.8rem;">Set</button>
                </div>

                <div style="display: flex; gap: 10px;">
                    <button id="nut-chay" onclick="kichHoatDongHo()">Khởi Động</button>
                    <button class="nut-dung" onclick="datLaiDongHo()">Hủy</button>
                </div>
            </section>
        </div>

        <!-- TERMINAL LOG -->
        <section class="the-giao-dien tram-lenh-mis">
            <div class="tieu-de-the" style="color: #38bdf8;">Nhật Ký Quản Trị Hệ Thống</div>
            <div class="loi-dong-lenh" id="man-hinh-log"></div>
        </section>

    </main>

    <script>
        // --- 1. LÕI DỮ LIỆU ĐỘNG (LOCAL STORAGE) ---
        // Lấy dữ liệu từ máy tính, nếu chưa có thì khởi tạo mặc định
        let duLieuHeThong = JSON.parse(localStorage.getItem('mis_database')) || {
            "Thứ Hai": [], "Thứ Ba": [], "Thứ Tư": [], "Thứ Năm": [], 
            "Thứ Sáu": [], "Thứ Bảy": [], "Chủ Nhật": []
        };

        const danhSachNgay = ["Thứ Hai", "Thứ Ba", "Thứ Tư", "Thứ Năm", "Thứ Sáu", "Thứ Bảy", "Chủ Nhật"];

        // Tính thứ hiện tại (0 là CN, 1 là T2...) -> quy đổi cho khớp danhSachNgay
        let hienTai = new Date().getDay();
        let indexHomNay = hienTai === 0 ? 6 : hienTai - 1;

        function luuDuLieu() {
            localStorage.setItem('mis_database', JSON.stringify(duLieuHeThong));
        }

        // --- 2. RENDER MA TRẬN TỪ DỮ LIỆU ---
        function renderMaTran() {
            const khungTuan = document.getElementById('bo-khung-tuan');
            khungTuan.innerHTML = "";

            danhSachNgay.forEach((ngay, index) => {
                const laHomNay = (index === indexHomNay) ? "hom-nay" : "";
                const danhSachTask = duLieuHeThong[ngay];
                
                // Thuật toán tính phần trăm
                let tongSo = danhSachTask.length;
                let daXong = danhSachTask.filter(t => t.done).length;
                let phanTram = tongSo === 0 ? 0 : Math.round((daXong / tongSo) * 100);

                let htmlTask = "";
                danhSachTask.forEach((task, i) => {
                    const classXong = task.done ? "da-xong" : "";
                    htmlTask += `
                        <div class="o-nhiem-vu ${classXong}" onclick="doiTrangThai('${ngay}', ${i})">
                            <span>${task.ten}</span>
                            <button class="nut-xoa" onclick="xoaTask(event, '${ngay}', ${i})">×</button>
                        </div>
                    `;
                });

                const theNgay = `
                    <div class="the-ngay ${laHomNay}">
                        <div class="khung-tieude-ngay">
                            <span class="ten-ngay">${ngay}</span>
                            <span class="phan-tram-hoan-thanh">[ ${phanTram}% ]</span>
                        </div>
                        <div class="thanh-tien-do-ngay">
                            <div class="loi-tien-do" style="width: ${phanTram}%;"></div>
                        </div>
                        <div class="danh-sach-task">${htmlTask}</div>
                        <div class="khung-nhap-lieu">
                            <input type="text" class="input-muc-tieu" placeholder="> Nhập mục tiêu mới và ấn Enter..." 
                                   onkeypress="xuLyNhapTask(event, '${ngay}')">
                        </div>
                    </div>
                `;
                khungTuan.innerHTML += theNgay;
            });

            // Ghi ngày hiện tại
            const options = { weekday: 'long', year: 'numeric', month: '2-digit', day: '2-digit' };
            document.getElementById('hien-thi-ngay').innerText = new Date().toLocaleDateString('vi-VN', options);
        }

        // --- 3. CÁC HÀM XỬ LÝ DỮ LIỆU (CRUD) ---
        function xuLyNhapTask(event, ngay) {
            if (event.key === "Enter") {
                const text = event.target.value.trim();
                if (text !== "") {
                    duLieuHeThong[ngay].push({ ten: text, done: false });
                    luuDuLieu();
                    renderMaTran();
                    inLogHienThi(`[DATABASE]: Đã ghi nhận mục tiêu mới: "${text}" vào ${ngay}.`);
                }
            }
        }

        function doiTrangThai(ngay, viTri) {
            duLieuHeThong[ngay][viTri].done = !duLieuHeThong[ngay][viTri].done;
            luuDuLieu();
            renderMaTran();
            
            if(duLieuHeThong[ngay][viTri].done) {
                inLogHienThi(`[AI_METRICS]: Xác nhận hoàn thành: "${duLieuHeThong[ngay][viTri].ten}". Điểm V.T.V tăng!`);
            }
        }

        function xoaTask(event, ngay, viTri) {
            event.stopPropagation(); // Ngăn click nhầm vào đổi trạng thái
            const tenBixoa = duLieuHeThong[ngay][viTri].ten;
            duLieuHeThong[ngay].splice(viTri, 1);
            luuDuLieu();
            renderMaTran();
            inLogHienThi(`[HỆ THỐNG]: Đã hủy bỏ quy trình: "${tenBixoa}".`);
        }

        // --- 4. ĐỒNG HỒ ĐẾM NGƯỢC TÙY CHỈNH ---
        let thoiGianGoc = 25 * 60; // Tính bằng giây
        let thoiGianConLai = thoiGianGoc;
        let boDemChay = null;
        const chuVi = 2 * Math.PI * 80;

        function capNhatThoiGianMoi() {
            if(boDemChay !== null) return alert("Vui lòng ấn Hủy đồng hồ đang chạy trước khi Set giờ mới!");
            let phutMoi = document.getElementById('input-phut').value;
            if(phutMoi > 0) {
                thoiGianGoc = phutMoi * 60;
                datLaiDongHo();
                inLogHienThi(`[HỆ THỐNG]: Cấu hình lại lõi năng lượng sang mức ${phutMoi} phút.`);
            }
        }

        function capNhatUI_DongHo() {
            const p = Math.floor(thoiGianConLai / 60).toString().padStart(2, '0');
            const g = (thoiGianConLai % 60).toString().padStart(2, '0');
            document.getElementById('thoi-gian-so').innerText = `${p}:${g}`;
            
            const phanTram = thoiGianConLai / thoiGianGoc;
            document.getElementById('vong-tien-trinh').style.strokeDashoffset = chuVi - (phanTram * chuVi);
        }

        function kichHoatDongHo() {
            const nut = document.getElementById('nut-chay');
            if (!boDemChay) {
                nut.innerText = "Tạm Dừng";
                inLogHienThi("[HỆ THỐNG]: Kích hoạt trạng thái tập trung sâu.");
                boDemChay = setInterval(() => {
                    if (thoiGianConLai > 0) {
                        thoiGianConLai--; capNhatUI_DongHo();
                    } else {
                        clearInterval(boDemChay); boDemChay = null;
                        nut.innerText = "Khởi Động";
                        alert("Hoàn thành mục tiêu thời gian!"); datLaiDongHo();
                    }
                }, 1000);
            } else {
                clearInterval(boDemChay); boDemChay = null;
                nut.innerText = "Tiếp Tục";
            }
        }

        function datLaiDongHo() {
            clearInterval(boDemChay); boDemChay = null;
            thoiGianConLai = thoiGianGoc;
            document.getElementById('nut-chay').innerText = "Khởi Động";
            capNhatUI_DongHo();
        }

        // --- 5. LOG SYSTEM & EASTER EGG ---
        function inLogHienThi(text) {
            const mh = document.getElementById('man-hinh-log');
            mh.innerHTML += `<div>> [${new Date().toLocaleTimeString()}] ${text}</div>`;
            mh.scrollTop = mh.scrollHeight;
        }

        let lsgp = "";
        window.addEventListener('keydown', e => {
            lsgp = (lsgp + e.key.toLowerCase()).slice(-5);
            if(lsgp.includes("meo")) {
                document.body.classList.toggle('che-do-meo');
                inLogHienThi("💖 [ĐẶC BIỆT]: Chuyển đổi giao diện hệ thống sang mã Mèo!");
            }
        });

        // Chạy ngay khi mở web
        window.onload = () => {
            renderMaTran();
            capNhatUI_DongHo();
            inLogHienThi("[KHỞI ĐỘNG]: Hệ thống M.I.S sẵn sàng nhận cấu trúc phân tích dữ liệu.");
        };
    </script>
</body>
</html>
